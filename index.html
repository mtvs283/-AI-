<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국어교육AI연구개발원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ShillaCulture';
      src: url('./Shilla_Culture_B.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      color: #1c1712;
      background: #f5f1e9;
    }

    body { overflow-x: hidden; }

    .hero {
      position: relative;
      min-height: 100vh;
      background-image: linear-gradient(rgba(255,255,255,.22), rgba(255,255,255,.18)), url('./hero-bg.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 58px;
      background: rgba(246, 242, 235, .58);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #201912;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .brand-title {
      font-family: 'ShillaCulture', 'Noto Sans KR', sans-serif;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -.02em;
    }

    .brand-sub {
      margin-top: 4px;
      font-size: 13px;
      color: #5f564b;
      font-weight: 500;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 42px;
      font-size: 17px;
      font-weight: 600;
    }

    .menu a {
      color: #31291f;
      text-decoration: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .lang { display:flex; gap: 8px; font-size: 14px; color: #574d42; }
    .lang span:first-child { background: rgba(255,255,255,.62); padding: 6px 8px; border-radius: 4px; }

    .cta {
      background: #211407;
      color: #fff;
      padding: 16px 28px;
      border-radius: 3px;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(31,20,9,.16);
    }

    .center-title {
      position: absolute;
      left: 50%;
      top: 34%;
      transform: translate(-50%, -50%);
      width: min(1160px, 86vw);
      text-align: center;
      font-family: 'ShillaCulture', 'Noto Sans KR', sans-serif;
      font-size: clamp(54px, 6.2vw, 112px);
      line-height: 1.08;
      letter-spacing: -.035em;
      color: #17120d;
      text-shadow: 0 6px 12px rgba(0,0,0,.16);
      animation: softBlink 3.2s ease-in-out infinite;
    }

    @keyframes softBlink {
      0%, 100% { opacity: .92; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.18); }
    }

    .left-slogan {
      position: absolute;
      left: 7.2vw;
      bottom: 12vh;
      z-index: 5;
    }

    .left-slogan .ko {
      font-family: 'ShillaCulture', 'Noto Sans KR', sans-serif;
      font-size: clamp(34px, 4vw, 70px);
      line-height: 1.12;
      letter-spacing: -.04em;
      text-shadow: 0 4px 10px rgba(0,0,0,.15);
    }

    .left-slogan .en {
      margin-top: 18px;
      font-family: Georgia, serif;
      font-size: clamp(18px, 1.7vw, 31px);
      font-style: italic;
      color: #7e6e5d;
    }

    .right-copy {
      position: absolute;
      right: 9vw;
      bottom: 11.5vh;
      width: 430px;
      z-index: 5;
      text-align: left;
    }

    .mini-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-weight: 800;
    }

    .mini-brand img { width: 38px; height: 38px; object-fit: contain; }

    .right-copy p {
      margin: 0 0 28px;
      font-size: 19px;
      line-height: 1.9;
      color: #392f25;
      font-weight: 500;
    }

    .buttons { display:flex; gap: 14px; }
    .btn {
      min-width: 172px;
      padding: 18px 24px;
      text-align: center;
      border-radius: 2px;
      font-weight: 800;
      text-decoration:none;
      border: 1px solid rgba(52,43,34,.18);
    }
    .btn.primary { background:#211407; color:#fff; }
    .btn.secondary { background:rgba(255,255,255,.34); color:#211407; }

    .scroll {
      position: absolute;
      left: 50%;
      bottom: 4.5vh;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: .25em;
      color:#9b846b;
    }
    .scroll::after {
      content:'';
      display:block;
      width:1px;
      height:46px;
      margin:10px auto 0;
      background:#d0aa72;
    }

    @media (max-width: 980px) {
      .nav { padding: 0 22px; height: 76px; }
      .menu, .lang { display:none; }
      .center-title { top: 33%; font-size: clamp(42px, 9vw, 74px); }
      .left-slogan { left: 28px; bottom: 29vh; }
      .right-copy { left: 28px; right:auto; bottom: 8vh; width: calc(100vw - 56px); }
      .buttons { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <main class="hero">
    <nav class="nav">
      <a class="brand" href="./index.html">
        <img src="./logo.png" alt="한국어교육AI연구개발원 로고" />
        <div>
          <div class="brand-title">한국어교육AI연구개발원</div>
          <div class="brand-sub">Korean Edu AI Institute</div>
        </div>
      </a>
      <div class="menu">
        <a href="./curriculum.html">커리큘럼</a>
        <a href="./platform.html">플랫폼</a>
        <a href="./research.html">연구개발</a>
        <a href="./training.html">교육연수</a>
        <a href="./partnership.html">기관제휴</a>
      </div>
      <div class="actions">
        <div class="lang"><span>KR</span><span>EN</span><span>JP</span><span>ZH</span></div>
        <a class="cta" href="./contact.html">문의하기</a>
      </div>
    </nav>

    <h1 class="center-title">한국어교육AI연구개발원</h1>

    <section class="left-slogan">
      <div class="ko">문화로 배우고,<br />언어로 말하다</div>
      <div class="en">Learn the culture. Speak the language.</div>
    </section>

    <section class="right-copy">
      <div class="mini-brand"><img src="./logo.png" alt="" />한국어교육AI연구개발원</div>
      <p>현장 교사들이 직접 설계하고, AI가 함께하는<br />진심 어린 한국어 교육 플랫폼</p>
      <div class="buttons">
        <a class="btn primary" href="./platform.html">플랫폼 보기</a>
        <a class="btn secondary" href="./training.html">교육연수 보기</a>
      </div>
    </section>

    <div class="scroll">SCROLL</div>
  </main>
</body>
</html>
